name: CI

on:
  push:
    branches: [main, dev, typescript]
  pull_request:
    branches: [main, dev, typescript]

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts

      - name: Unit tests
        run: npm test
